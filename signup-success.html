<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dMusik — Sign Up Success</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    :root {
      --brandA: #ff8800;
      --brandB: #ff3c00;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--brandA), var(--brandB));
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 18px;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px 60px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      max-width: 480px;
      width: 100%;
      animation: fadeIn 0.8s ease-out;
      position: relative;
      overflow: hidden;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .logo img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
    }

    .logo span {
      font-weight: 600;
      font-size: 1.6em;
      letter-spacing: 0.5px;
      line-height: 1;
    }

    .lang {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 999px;
      overflow: hidden;
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
    }

    .lang button {
      border: 0;
      background: transparent;
      color: rgba(255,255,255,.92);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .08em;
      padding: 8px 10px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background .18s ease, color .18s ease, opacity .18s ease;
    }

    .lang button:hover { opacity: .92; }

    .lang button[aria-pressed="true"] {
      background: #fff;
      color: var(--brandB);
    }

    .icon {
      font-size: 64px;
      margin: 10px 0 18px;
    }

    h1 {
      font-size: 1.9em;
      margin: 0 0 10px;
      font-weight: 600;
    }

    p {
      opacity: 0.92;
      font-size: 1em;
      margin: 0 0 28px;
    }

    a.btn {
      display: inline-block;
      background: #fff;
      color: var(--brandB);
      padding: 12px 30px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    a.btn:hover {
      background: #fff4e6;
      transform: scale(1.05);
    }

    footer {
      margin-top: 22px;
      font-size: 0.85em;
      opacity: 0.86;
    }

    @media (max-width: 520px) {
      .container { padding: 28px 20px; }
      .logo span { font-size: 1.45em; }
      .topbar { margin-bottom: 14px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="logo">
        <img src="./assets/app-icon.png" alt="dMusik Logo" data-i18n-alt="brand.iconAlt" />
        <span>dMusik</span>
      </div>

      <span class="lang" aria-label="Language switch">
        <button id="langEN" type="button" aria-pressed="true">EN</button>
        <button id="langPT" type="button" aria-pressed="false">PT</button>
      </span>
    </div>

    <div class="icon" aria-hidden="true">🎶</div>

    <h1 data-i18n="title">Welcome Aboard!</h1>

    <p data-i18n-html="bodyHtml">
      Your dMusik account has been created successfully.<br>
      You can now sign in and start enjoying your favorite tunes.
    </p>

    <!-- Optional CTA (kept subtle; change href to your app/login page if you want) -->
    <!--<a class="btn" href="./index.html" data-i18n="cta">Go to website</a> -->
  </div>

  <footer>© <span id="year"></span> dMusik. <span data-i18n="rights">All rights reserved.</span></footer>

  <script>
    const STORAGE_KEY = "dmusic_lang";
    const supported = ["en", "pt"];

    const I18N = {
      en: {
        "brand.iconAlt": "dMusik Logo",
        "title": "Welcome Aboard!",
        "bodyHtml": "Your dMusik account has been created successfully.<br>You can now sign in and start enjoying your favorite tunes.",
        "cta": "Go to website",
        "rights": "All rights reserved.",
      },
      pt: {
        "brand.iconAlt": "Logótipo do dMusik",
        "title": "Bem-vindo(a)!",
        "bodyHtml": "A tua conta dMusik foi criada com sucesso.<br>Já podes iniciar sessão e começar a ouvir as tuas músicas favoritas.",
        "cta": "Ir para o website",
        "rights": "Todos os direitos reservados.",
      }
    };

    function detectDefaultLang() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved && supported.includes(saved)) return saved;
      const nav = (navigator.language || "en").toLowerCase();
      if (nav.startsWith("pt")) return "pt";
      return "en";
    }

    function setLang(lang) {
      if (!supported.includes(lang)) lang = "en";
      document.documentElement.lang = lang;
      localStorage.setItem(STORAGE_KEY, lang);

      const enBtn = document.getElementById("langEN");
      const ptBtn = document.getElementById("langPT");
      if (enBtn) enBtn.setAttribute("aria-pressed", String(lang === "en"));
      if (ptBtn) ptBtn.setAttribute("aria-pressed", String(lang === "pt"));

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        const value = I18N[lang][key];
        if (typeof value === "string") el.textContent = value;
      });

      document.querySelectorAll("[data-i18n-html]").forEach(el => {
        const key = el.getAttribute("data-i18n-html");
        const value = I18N[lang][key];
        if (typeof value === "string") el.innerHTML = value;
      });

      document.querySelectorAll("[data-i18n-alt]").forEach(el => {
        const key = el.getAttribute("data-i18n-alt");
        const value = I18N[lang][key];
        if (typeof value === "string") el.setAttribute("alt", value);
      });

      // Title
      document.title = (lang === "pt")
        ? "dMusik — Registo com Sucesso"
        : "dMusik — Sign Up Success";
    }

    document.getElementById("year").textContent = new Date().getFullYear();

    setLang(detectDefaultLang());
    document.getElementById("langEN").addEventListener("click", () => setLang("en"));
    document.getElementById("langPT").addEventListener("click", () => setLang("pt"));
  </script>
</body>
</html>
